<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Vigentiss — something new is on the way."
    />
    <title>Vigentiss — Coming soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg0: #0a0b0f;
        --bg1: #12141c;
        --fg: #e8eaf0;
        --muted: #8b91a0;
        --accent: #6ee7b7;
        --glow: rgba(110, 231, 183, 0.12);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: "DM Sans", system-ui, -apple-system, sans-serif;
        color: var(--fg);
        background: radial-gradient(
            120% 80% at 50% 0%,
            var(--glow),
            transparent 60%
          ),
          linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(1.5rem, 4vw, 3rem);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      main {
        max-width: 32rem;
        text-align: center;
      }

      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3rem;
        height: 3rem;
        margin-bottom: 1.75rem;
        border-radius: 0.75rem;
        background: linear-gradient(145deg, #1a1d28, #13151d);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--accent);
      }

      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1.2;
        margin: 0 0 0.75rem;
      }

      p {
        color: var(--muted);
        font-size: 1.0625rem;
        line-height: 1.6;
        margin: 0;
      }

      .rule {
        width: 2.5rem;
        height: 2px;
        margin: 1.75rem auto;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity: 0.5;
        border-radius: 1px;
      }

      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1rem 1.5rem 1.5rem;
        text-align: center;
        font-size: 0.8125rem;
        color: rgba(139, 145, 160, 0.65);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">V</div>
      <h1>We’re building something new</h1>
      <p>
        Vigentiss will be here soon. Check back in a little while, or set up
        your custom domain while we work on the full site.
      </p>
      <div class="rule" aria-hidden="true"></div>
    </main>
    <footer>&copy; <span id="y"></span> Vigentiss</footer>
    <script>
      document.getElementById("y").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
